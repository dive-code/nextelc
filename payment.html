<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nextel Payment - Account 2</title>
<style>
body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;padding:20px}
.box{background:#1e293b;padding:20px;border-radius:12px;margin-bottom:20px}
.row{display:flex;justify-content:space-between;margin:10px 0}
.account-box{background:#0f172a;padding:12px;border-radius:8px;text-align:center;font-size:18px;font-weight:bold;margin:10px 0}
.copy-btn{width:100%;padding:10px;background:#3b82f6;border:none;border-radius:8px;color:#fff;cursor:pointer;font-weight:bold}
#confirmBtn{width:100%;padding:14px;background:#22c55e;border:none;border-radius:10px;color:#fff;font-size:16px;font-weight:bold;margin-top:15px;cursor:pointer}
#confirmBtn:disabled{background:#475569;cursor:not-allowed}
.success{display:none;background:#22c55e;padding:12px;border-radius:8px;margin-top:10px;text-align:center}
.note{font-size:12px;color:#94a3b8;margin-top:8px;text-align:center}
.plan-summary{text-align:center;margin-bottom:15px}
#timer{font-weight:bold;color:#facc15}
</style>
</head>
<body>

<!-- ACCOUNT 2 -->
<div class="box">
<strong>PAYMENT OPTION 2</strong>

<!-- PLAN DETAILS -->
<div class="plan-summary">
  <h3 id="planName">Loading...</h3>
  <p><span id="planTag"></span></p>
  <p>Price: <strong id="planPrice">--</strong></p>
  <p>Time Left: <span id="timer">15:00</span></p>
</div>

<div class="row"><span>Bank</span><span>PALMPAY</span></div>
<div class="row"><span>Account Name</span><span>Divine Abanum</span></div>
<div class="row"><span>Account Number</span></div>
<div class="account-box">
  <div class="account-number">9160049921</div>
</div>
<button class="copy-btn" onclick="copyAccount('9160049921',this)">Copy Account Number</button>
</div>

<button id="confirmBtn">I Have Made Payment</button>
<div class="success" id="successBox">Opening Telegram to notify support...</div>
<div class="note">Click above after payment. Your details will be sent automatically.</div>

<script>
/* LOAD PLAN + USER FROM LOCALSTORAGE */
const user = JSON.parse(localStorage.getItem('nextel_user'));
const params = new URLSearchParams(window.location.search);
const urlPlan = (params.get("plan") || "").toLowerCase().trim();

const packages = {
diamond: { name: "💎 Diamond eSIM Package", price: "₦10,500", tag: "Instant Activation" },
royale: { name: "👑 Royale eSIM Package", price: "₦17,500", tag: "VIP Priority Activation" }
};

let planData = { name: "Unknown Package", price: "--", tag: "❌ No plan selected" };

if(user && user.plan && packages[user.plan]) {
  planData = packages[user.plan];
}
else if(urlPlan && packages[urlPlan]) {
  planData = packages[urlPlan];
}

// Set plan details
if(document.getElementById("planName")) document.getElementById("planName").innerText = planData.name;
if(document.getElementById("planNameInline")) document.getElementById("planNameInline").innerText = planData.name.split(' ')[1];
if(document.getElementById("planPrice")) document.getElementById("planPrice").innerText = planData.price;
if(document.getElementById("planTag")) document.getElementById("planTag").innerText = planData.tag;

/* COPY FUNCTION */
function copyAccount(number, btn){
  navigator.clipboard.writeText(number);
  const old = btn.innerText;
  btn.innerText = "Copied ✓";
  setTimeout(()=>{ btn.innerText = old; },1500);
}

/* TIMER - 15 MINUTES */
let timeLeft = 15 * 60;
const timerEl = document.getElementById('timer');
const confirmBtn = document.getElementById('confirmBtn');

const countdown = setInterval(() => {
  let minutes = Math.floor(timeLeft / 60);
  let seconds = timeLeft % 60;
  minutes = minutes < 10? '0' + minutes : minutes;
  seconds = seconds < 10? '0' + seconds : seconds;
  if(timerEl) timerEl.innerText = ${minutes}:${seconds};
  if(timeLeft <= 60 && timerEl) { timerEl.style.color = '#ef4444'; }
  if(timeLeft <= 0) {
    clearInterval(countdown);
    if(timerEl) timerEl.innerText = "00:00";
    confirmBtn.disabled = true;
    confirmBtn.innerText = "Session Expired";
